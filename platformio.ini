[platformio]
src_dir = .

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
build_unflags = -std=gnu++14
build_flags =
 -std=gnu++17
 -D CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY=1
 -D BOARD_HAS_PSRAM

[env:AntiHunter-full]
extends = env
board = seeed_xiao_esp32s3
build_src_filter = -<*>+<Antihunter/full/src/*>
monitor_speed = 115200
extra_scripts = post:scripts/set_rtc_time.py
lib_deps =
 esp32async/ESPAsyncWebServer@3.10.0
 esp32async/AsyncTCP@3.4.10
 mikalhart/TinyGPSPlus@1.1.0
 h2zero/NimBLE-Arduino@2.3.9
 adafruit/RTClib@2.1.4
 bblanchon/ArduinoJson@6.21.6
build_flags =
 ${env.build_flags}
 -D ARDUINO_USB_CDC_ON_BOOT=1
 -D ARDUINO_USB_MODE=1
 -D CONFIG_BT_NIMBLE_ENABLED=1
 -D CONFIG_ESP32_WIFI_RAW_FRAME_SANITY_CHECK=0
 -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
 -D CONFIG_ASYNC_TCP_STACK_SIZE=8192
check_tool = cppcheck
check_skip_packages = yes
check_src_filters = +<Antihunter/full/src/*> -<Antihunter/full/src/wifi.c> -<Antihunter/full/src/opendroneid.c>
check_flags =
            --enable=all
            --std=c++17
            --suppress=missingIncludeSystem
            --suppress=missingInclude
            --suppress=checkersReport
            --suppress=unusedFunction
            --inline-suppr
            -DPROGMEM=

[env:AntiHunter-headless]
extends = env
board = seeed_xiao_esp32s3
build_src_filter = -<*>+<Antihunter/headless/src/*>
monitor_speed = 115200
extra_scripts = post:scripts/set_rtc_time.py
lib_deps =
 mikalhart/TinyGPSPlus@1.1.0
 h2zero/NimBLE-Arduino@2.3.9
 adafruit/RTClib@2.1.4
 bblanchon/ArduinoJson@6.21.6
build_flags =
 ${env.build_flags}
 -D ARDUINO_USB_CDC_ON_BOOT=1
 -D ARDUINO_USB_MODE=1
 -D CONFIG_BT_NIMBLE_ENABLED=1
 -D CONFIG_ESP32_WIFI_RAW_FRAME_SANITY_CHECK=0
check_tool = cppcheck
check_skip_packages = yes
check_src_filters = +<Antihunter/headless/src/*> -<Antihunter/headless/src/wifi.c> -<Antihunter/headless/src/opendroneid.c>
check_flags =
            --enable=all
            --std=c++17
            --suppress=missingIncludeSystem
            --suppress=missingInclude
            --suppress=checkersReport
            --suppress=unusedFunction
            --inline-suppr
            -DPROGMEM=

[c5_base]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
platform_packages =
 toolchain-riscv32-esp@14.2.0+20251107
framework = arduino
board = seeed-xiao-esp32-c5
monitor_speed = 115200
board_build.arduino.memory_type = qio_qspi
board_build.partitions = Dist/partitions.csv
upload_speed = 115200
upload_flags = --no-stub
build_unflags = -std=gnu++14
build_flags =
 -std=gnu++17
 -D CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY=1
 -D BOARD_HAS_PSRAM
 -D ARDUINO_USB_CDC_ON_BOOT=1
 -D ARDUINO_USB_MODE=1
 -D CONFIG_BT_NIMBLE_ENABLED=1
 -D CONFIG_ESP32_WIFI_RAW_FRAME_SANITY_CHECK=0

[env:AntiHunter-c5-full]
extends = c5_base
build_src_filter = -<*>+<Antihunter/full/src/*>
extra_scripts =
 post:scripts/set_rtc_time.py
lib_deps =
 esp32async/ESPAsyncWebServer@3.10.0
 esp32async/AsyncTCP@3.4.10
 mikalhart/TinyGPSPlus@1.1.0
 h2zero/NimBLE-Arduino@2.3.9
 adafruit/RTClib@2.1.4
 bblanchon/ArduinoJson@6.21.6
build_flags =
 ${c5_base.build_flags}
 -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
 -D CONFIG_ASYNC_TCP_STACK_SIZE=8192

[env:AntiHunter-c5-headless]
extends = c5_base
build_src_filter = -<*>+<Antihunter/headless/src/*>
extra_scripts =
 post:scripts/set_rtc_time.py
lib_deps =
 mikalhart/TinyGPSPlus@1.1.0
 h2zero/NimBLE-Arduino@2.3.9
 adafruit/RTClib@2.1.4
 bblanchon/ArduinoJson@6.21.6
