name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0

    - name: Get version + channel from tag
      id: get_version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        echo "version=${TAG}" >> $GITHUB_OUTPUT
        # Beta channel: tags matching v*-beta* (e.g. v1.2.0-beta, v1.2.0-beta3)
        # Stable channel: plain v* (e.g. v1.2.0)
        if [[ "$TAG" == *-beta* ]]; then
          echo "channel=beta" >> $GITHUB_OUTPUT
          echo "branch=beta" >> $GITHUB_OUTPUT
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "channel=stable" >> $GITHUB_OUTPUT
          echo "branch=stable" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'

    - name: Cache PlatformIO
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      with:
        path: ~/.platformio
        key: platformio-${{ hashFiles('platformio.ini') }}

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    - name: Build
      run: pio run

    - name: Prepare release artifacts
      run: |
        mkdir -p release
        cp .pio/build/AntiHunter-full/firmware.bin release/antihunter-full-${{ steps.get_version.outputs.version }}.bin
        cp .pio/build/AntiHunter-headless/firmware.bin release/antihunter-headless-${{ steps.get_version.outputs.version }}.bin
        cp Dist/bootloader.bin release/
        cp Dist/partitions.bin release/
        cp Dist/flashAntihunter.sh release/

    - name: Generate checksums
      run: |
        cd release
        sha256sum *.bin flashAntihunter.sh > SHA256SUMS.txt

    - name: Update Dist bins and web flasher manifests
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        BRANCH=${{ steps.get_version.outputs.branch }}
        RAW="https://raw.githubusercontent.com/lukeswitz/AntiHunter/${BRANCH}/Dist"

        cp .pio/build/AntiHunter-full/firmware.bin "Dist/antihunter-full-${VERSION}.bin"
        cp .pio/build/AntiHunter-headless/firmware.bin "Dist/antihunter-headless-${VERSION}.bin"

        for VARIANT in full headless; do
          cat > "docs/flasher/manifest-${VARIANT}.json" <<EOF
        {
          "name": "AntiHunter $(echo ${VARIANT} | sed 's/^./\U&/') (${VERSION})",
          "new_install_prompt_erase": true,
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [
                { "path": "${RAW}/bootloader.bin", "offset": 0 },
                { "path": "${RAW}/partitions.bin", "offset": 32768 },
                { "path": "${RAW}/antihunter-${VARIANT}-${VERSION}.bin", "offset": 65536 }
              ]
            }
          ]
        }
        EOF
        done

    - name: Commit updated Dist and manifests
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Dist/*.bin docs/flasher/manifest-*.json
        git diff --cached --quiet || git commit -m "dist: update bins and flasher manifests for ${{ steps.get_version.outputs.version }} (${{ steps.get_version.outputs.channel }})"
        git push origin HEAD:${{ steps.get_version.outputs.branch }}

    - name: Create Release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
      with:
        files: release/*
        prerelease: ${{ steps.get_version.outputs.prerelease }}
