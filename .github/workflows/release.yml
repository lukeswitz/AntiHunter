name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0

    - name: Get version + channel from tag
      id: get_version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        echo "version=${TAG}" >> $GITHUB_OUTPUT
        # Beta channel: tags matching v*-beta* (e.g. v1.2.0-beta, v1.2.0-beta3) -> beta branch
        # Stable channel: plain v* (e.g. v1.2.0) -> main branch
        if [[ "$TAG" == *-beta* ]]; then
          echo "channel=beta" >> $GITHUB_OUTPUT
          echo "branch=beta" >> $GITHUB_OUTPUT
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "channel=stable" >> $GITHUB_OUTPUT
          echo "branch=main" >> $GITHUB_OUTPUT
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: '3.11'

    - name: Cache PlatformIO
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    - name: Build AntiHunter-full
      run: pio run -e AntiHunter-full

    - name: Build AntiHunter-headless
      run: pio run -e AntiHunter-headless

    - name: Prepare release artifacts
      run: |
        mkdir -p release
        cp .pio/build/AntiHunter-full/firmware.bin release/antihunter-full-${{ steps.get_version.outputs.version }}.bin
        cp .pio/build/AntiHunter-headless/firmware.bin release/antihunter-headless-${{ steps.get_version.outputs.version }}.bin
        # bootloader + partitions MUST come from the fresh build (IDF/core version must match the app)
        cp .pio/build/AntiHunter-full/bootloader.bin release/
        cp .pio/build/AntiHunter-full/partitions.bin release/
        cp Dist/flashAntihunter.sh release/

    - name: Generate checksums
      run: |
        cd release
        sha256sum *.bin flashAntihunter.sh > SHA256SUMS.txt

    - name: Update Dist bins and web flasher manifests
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        BRANCH="${{ steps.get_version.outputs.branch }}"
        RAW="https://raw.githubusercontent.com/lukeswitz/AntiHunter/${BRANCH}/Dist"

        # Remove old versioned bins; keep bootloader, partitions, flashAntihunter.sh
        rm -f Dist/antihunter-*.bin

        cp .pio/build/AntiHunter-full/firmware.bin "Dist/antihunter-full-${VERSION}.bin"
        cp .pio/build/AntiHunter-headless/firmware.bin "Dist/antihunter-headless-${VERSION}.bin"
        # refresh bootloader + partitions from the build so they match the app's IDF/core
        cp .pio/build/AntiHunter-full/bootloader.bin Dist/bootloader.bin
        cp .pio/build/AntiHunter-full/partitions.bin Dist/partitions.bin

        mkdir -p docs/flasher

        CHANNEL="${{ steps.get_version.outputs.channel }}"
        CHANNEL_TITLE="$(echo "${CHANNEL}" | sed 's/^./\U&/')"

        # Manifest name carries the channel, and the body declares channel/variant
        # so docs/index.html can reject a manifest that does not match the selection.
        for VARIANT in full headless; do
          VARIANT_TITLE="$(echo "${VARIANT}" | sed 's/^./\U&/')"
          cat > "docs/flasher/manifest-${VARIANT}-${CHANNEL}.json" <<EOF
        {
          "name": "AntiHunter ${VARIANT_TITLE} - ${CHANNEL_TITLE} (${VERSION})",
          "version": "${VERSION}",
          "channel": "${CHANNEL}",
          "variant": "${VARIANT}",
          "new_install_prompt_erase": true,
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [
                { "path": "${RAW}/bootloader.bin", "offset": 0 },
                { "path": "${RAW}/partitions.bin", "offset": 32768 },
                { "path": "${RAW}/antihunter-${VARIANT}-${VERSION}.bin", "offset": 65536 }
              ]
            }
          ]
        }
        EOF
          # Legacy unsuffixed name, kept for cached copies of the old page.
          cp "docs/flasher/manifest-${VARIANT}-${CHANNEL}.json" "docs/flasher/manifest-${VARIANT}.json"
        done

    - name: Checkout channel branch and apply artifacts
      run: |
        BRANCH="${{ steps.get_version.outputs.branch }}"
        VERSION="${{ steps.get_version.outputs.version }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Stash the built artifacts so we can switch branches
        cp -r Dist /tmp/ah-dist
        cp -r docs/flasher /tmp/ah-flasher

        # Checkout the channel branch (already fetched via fetch-depth: 0)
        git checkout "${BRANCH}"

        # Apply artifacts onto the branch
        rm -f Dist/antihunter-*.bin
        cp /tmp/ah-dist/antihunter-*.bin Dist/
        cp /tmp/ah-dist/bootloader.bin /tmp/ah-dist/partitions.bin Dist/
        mkdir -p docs/flasher
        cp /tmp/ah-flasher/manifest-*.json docs/flasher/

        git add Dist/antihunter-*.bin Dist/bootloader.bin Dist/partitions.bin docs/flasher/manifest-*.json
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "dist: update bins and flasher manifests for ${VERSION} (${{ steps.get_version.outputs.channel }})"
        git push origin "${BRANCH}"

    - name: Publish flasher manifests to docs branch
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        CHANNEL="${{ steps.get_version.outputs.channel }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # docs/ (GitHub Pages) is served from main, so both channels' manifests
        # must land on main. Only this channel's files are touched - a beta
        # release can never rewrite the stable manifest.
        git fetch origin main
        git checkout -B main origin/main

        mkdir -p docs/flasher
        cp /tmp/ah-flasher/manifest-*-"${CHANNEL}".json docs/flasher/
        if [ "${CHANNEL}" = "stable" ]; then
          cp /tmp/ah-flasher/manifest-full.json /tmp/ah-flasher/manifest-headless.json docs/flasher/
        fi

        git add docs/flasher/manifest-*.json
        git diff --cached --quiet && echo "No manifest changes to commit" && exit 0
        git commit -m "docs: flasher manifests for ${VERSION} (${CHANNEL})"
        git push origin main

    - name: Create Release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: ${{ steps.get_version.outputs.version }}
        files: release/*
        prerelease: ${{ steps.get_version.outputs.prerelease }}
        generate_release_notes: true
