name: Code Quality
permissions:
  contents: read

on:
  push:
    branches: [ stable, beta ]
  pull_request:
    branches: [ stable, beta ]

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install cppcheck 2.20
      run: |
        sudo apt-get install -y cmake build-essential libpcre3-dev
        curl -sL https://github.com/danmar/cppcheck/archive/refs/tags/2.20.0.tar.gz | tar xz
        cmake -S cppcheck-2.20.0 -B cppcheck-build -DCMAKE_BUILD_TYPE=Release
        cmake --build cppcheck-build -j"$(nproc)"
        sudo cmake --install cppcheck-build

    - name: Run cppcheck (full + headless)
      run: make lint

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Cache PlatformIO
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install --upgrade platformio

    - name: Build AntiHunter-full
      run: pio run -e AntiHunter-full

    - name: Build AntiHunter-headless
      run: pio run -e AntiHunter-headless
